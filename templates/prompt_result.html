<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Generated UI HTML</title>
    <style>
      :root {
        --ink: #1d1b1a;
        --muted: #6b5d54;
        --card: #f8f2ec;
        --accent: #ff8a3d;
        --accent-dark: #d16b26;
        --border: #e2d6cc;
        --shadow: rgba(30, 20, 12, 0.12);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "Gill Sans", "Trebuchet MS", "Segoe UI", sans-serif;
        color: var(--ink);
        background:
          radial-gradient(circle at top, #ffe6d3 0%, rgba(255, 230, 211, 0) 50%),
          radial-gradient(circle at 20% 40%, #f6c8a1 0%, rgba(246, 200, 161, 0) 55%),
          linear-gradient(120deg, #fdf7f1, #f4ece3);
        min-height: 100vh;
        padding: 40px 20px 60px;
      }

      header {
        width: min(1100px, 100%);
        margin: 0 auto 20px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
      }

      header h1 {
        margin: 0;
        font-size: 28px;
        font-family: "Palatino Linotype", "Book Antiqua", Palatino, serif;
      }

      .actions {
        display: flex;
        align-items: center;
        gap: 12px;
        flex-wrap: wrap;
      }

      .actions form {
        margin: 0;
      }

      .button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
        text-decoration: none;
        color: var(--accent-dark);
        font-weight: 600;
        font-family: inherit;
        border: 1px solid #f0d2bf;
        padding: 8px 14px;
        border-radius: 999px;
        background: #fff2e5;
        cursor: pointer;
      }

      .button.primary {
        border: none;
        color: #fff;
        background: linear-gradient(120deg, var(--accent), var(--accent-dark));
        box-shadow: 0 12px 24px rgba(255, 138, 61, 0.35);
      }

      .grid {
        width: min(1100px, 100%);
        margin: 0 auto;
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
        gap: 20px;
        align-items: stretch;
      }

      .card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 20px;
        padding: 22px;
        box-shadow: 0 18px 40px var(--shadow);
        position: relative;
        overflow: hidden;
      }

      .card::after {
        content: "";
        position: absolute;
        top: -40px;
        right: -40px;
        width: 140px;
        height: 140px;
        background: radial-gradient(circle, rgba(255, 138, 61, 0.4), transparent 70%);
        opacity: 0.6;
      }

      textarea {
        width: 100%;
        border-radius: 14px;
        border: 1px solid var(--border);
        padding: 14px;
        font-size: 13px;
        font-family: "Courier New", Courier, monospace;
        background: #fffaf6;
        color: #2e1f18;
        resize: vertical;
      }

      textarea.prompt-input {
        min-height: 180px;
        font-family: "Gill Sans", "Trebuchet MS", "Segoe UI", sans-serif;
        font-size: 14px;
      }

      textarea.output {
        min-height: 360px;
      }

      .prompt-fields {
        display: grid;
        gap: 14px;
      }

      .preview {
        width: 100%;
        min-height: 360px;
        border-radius: 14px;
        border: 1px solid var(--border);
        background: #fff;
      }

      .note {
        color: var(--muted);
        font-size: 14px;
        margin-bottom: 12px;
      }

      .cta {
        border: none;
        background: linear-gradient(120deg, var(--accent), var(--accent-dark));
        color: #fff;
        padding: 14px 18px;
        font-size: 15px;
        font-weight: 600;
        border-radius: 12px;
        cursor: pointer;
        transition: transform 0.2s ease, box-shadow 0.2s ease;
        box-shadow: 0 12px 24px rgba(255, 138, 61, 0.35);
      }

      .cta:hover {
        transform: translateY(-2px);
        box-shadow: 0 16px 28px rgba(255, 138, 61, 0.45);
      }

      .cta:disabled {
        cursor: wait;
        opacity: 0.8;
        transform: none;
        box-shadow: none;
      }

      .hidden-field {
        display: none;
      }

      .toast {
        position: fixed;
        right: 24px;
        bottom: 24px;
        padding: 14px 18px;
        border-radius: 14px;
        background: #1d1b1a;
        color: #fff6ef;
        font-size: 14px;
        box-shadow: 0 18px 40px rgba(30, 20, 12, 0.35);
        opacity: 0;
        transform: translateY(12px) scale(0.98);
        pointer-events: none;
        transition: opacity 0.2s ease, transform 0.2s ease;
        z-index: 10;
      }

      .toast.show {
        opacity: 1;
        transform: translateY(0) scale(1);
      }

      @media (max-width: 700px) {
        body {
          padding: 32px 16px;
        }

        header h1 {
          font-size: 24px;
        }
      }

      @media (min-width: 1024px) {
        .grid {
          grid-template-columns: minmax(320px, 1fr) minmax(360px, 1.6fr);
          grid-template-areas:
            "prompt preview"
            "output preview";
        }

        .prompt-card {
          grid-area: prompt;
        }

        .output-card {
          grid-area: output;
        }

        .preview-card {
          grid-area: preview;
          display: flex;
          flex-direction: column;
        }

        .preview {
          flex: 1;
          min-height: 520px;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <h1>Generated UI HTML</h1>
      <div class="actions">
        <form id="download-form" action="{{ url_for('download') }}" method="post">
          <textarea class="hidden-field" id="download-html" name="html">{{ html | e }}</textarea>
          <button class="button primary" type="submit">Download HTML</button>
        </form>
        <a class="button" href="{{ url_for('prompt_ui') }}">Back to prompt</a>
        <a class="button" href="{{ url_for('index') }}">Screenshot upload</a>
      </div>
    </header>

    <form class="grid" action="{{ url_for('generate_ui') }}" method="post" data-toast-message="Request sent. Updating HTML..." data-submit-label="Updating...">
      <div class="card prompt-card">
        <div class="note">Prompt (edit and update HTML)</div>
        <div class="prompt-fields">
          <textarea class="prompt-input" name="prompt" required>{{ prompt | e }}</textarea>
          <button class="cta" type="submit">Update HTML</button>
        </div>
      </div>
      <div class="card output-card">
        <div class="note">HTML output (editable)</div>
        <textarea class="output" id="html-output" name="html">{{ html | e }}</textarea>
      </div>
      <div class="card preview-card">
        <div class="note">Live preview</div>
        <iframe class="preview" id="html-preview" srcdoc="{{ html | e }}"></iframe>
      </div>
    </form>

    <div class="toast" id="request-toast" role="status" aria-live="polite">
      Request sent. Updating HTML...
    </div>

    <script>
      const toast = document.getElementById("request-toast");
      const form = document.querySelector("form[data-toast-message]");
      const htmlOutput = document.getElementById("html-output");
      const previewFrame = document.getElementById("html-preview");
      const downloadForm = document.getElementById("download-form");
      const downloadField = document.getElementById("download-html");

      if (toast && form) {
        const submitButton = form.querySelector("button[type='submit']");
        const submitLabel = form.dataset.submitLabel || "Updating...";

        form.addEventListener("submit", () => {
          toast.textContent = form.dataset.toastMessage || "Request sent.";
          toast.classList.add("show");
          if (submitButton) {
            submitButton.disabled = true;
            submitButton.textContent = submitLabel;
          }
        });
      }

      if (htmlOutput && previewFrame) {
        let previewTimer;
        const updatePreview = () => {
          previewFrame.srcdoc = htmlOutput.value;
        };
        htmlOutput.addEventListener("input", () => {
          clearTimeout(previewTimer);
          previewTimer = setTimeout(updatePreview, 250);
        });
      }

      if (downloadForm && downloadField && htmlOutput) {
        downloadForm.addEventListener("submit", () => {
          downloadField.value = htmlOutput.value;
        });
      }
    </script>
  </body>
</html>
