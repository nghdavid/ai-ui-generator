<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fintech Dashboard</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background-color: #f5f0e1;
            color: #333;
        }
        .container {
            display: flex;
            height: 100vh;
        }
        .sidebar {
            width: 250px;
            background-color: #e8d6b8;
            padding: 20px;
            box-shadow: 2px 0 5px rgba(0, 0, 0, 0.1);
        }
        .sidebar h2 {
            font-size: 24px;
            margin-bottom: 20px;
        }
        .sidebar nav a {
            display: block;
            color: #333;
            text-decoration: none;
            margin: 10px 0;
            padding: 10px;
            border-radius: 5px;
            transition: background-color 0.3s;
        }
        .sidebar nav a:hover {
            background-color: #d1c6a8;
        }
        .main {
            flex-grow: 1;
            padding: 20px;
        }
        .summary-cards {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
        }
        .card {
            background-color: #e8d6b8;
            border-radius: 10px;
            padding: 20px;
            flex: 1;
            margin: 0 10px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }
        .card h3 {
            margin: 0 0 10px;
        }
        .chart {
            background: linear-gradient(135deg, #d1c6a8, #e8d6b8);
            border-radius: 10px;
            height: 300px;
            position: relative;
            overflow: hidden;
        }
        .chart::before {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 80%;
            background: rgba(255, 255, 255, 0.3);
            clip-path: polygon(0 100%, 25% 40%, 50% 60%, 75% 20%, 100% 50%, 100% 100%, 0 100%);
        }
    </style>
</head>
<body>
    <div class="container">
        <aside class="sidebar">
            <h2>Dashboard</h2>
            <nav>
                <a href="#">Overview</a>
                <a href="#">Transactions</a>
                <a href="#">Investments</a>
                <a href="#">Reports</a>
                <a href="#">Settings</a>
            </nav>
        </aside>
        <main class="main">
            <div class="summary-cards">
                <div class="card">
                    <h3>Total Balance</h3>
                    <p>$10,000</p>
                </div>
                <div class="card">
                    <h3>Monthly Income</h3>
                    <p>$2,500</p>
                </div>
                <div class="card">
                    <h3>Expenses</h3>
                    <p>$1,200</p>
                </div>
            </div>
            <div class="chart">
                <h3>Income Over Time</h3>
            </div>
        </main>
    </div>
</body>
</html>
